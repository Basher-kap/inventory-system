name: E2E Tests

on:
  push:
    branches:
      - preview-e2e
      - "feature/**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write # needed to post E2E results as a PR comment

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: inventory-system

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: inventory-system/package-lock.json

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      # Install Playwright and its browsers (Chromium only — faster CI)
      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Build Project
        run: npm run build
        env:
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # Serve the built app locally then run Playwright against it.
      # This avoids needing a deployed URL — tests run against localhost.
      - name: Run E2E Tests
        run: npx playwright test --reporter=list,json --output=playwright-results
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          CI: true

      # Always upload the HTML report so you can download and inspect it
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: inventory-system/playwright-report/
          retention-days: 7

      # Post a pass/fail summary comment on the PR
      - name: Comment E2E results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              const raw = fs.readFileSync('inventory-system/playwright-results/results.json', 'utf8');
              const results = JSON.parse(raw);
              const passed = results.suites?.flatMap(s => s.specs).filter(s => s.ok).length ?? 0;
              const failed = results.suites?.flatMap(s => s.specs).filter(s => !s.ok).length ?? 0;
              const total = passed + failed;
              const status = failed === 0 ? '✅' : '❌';
              summary = `### ${status} E2E Test Results\n\n**${passed}/${total} tests passed**\n\n` +
                (failed > 0
                  ? `> ${failed} test(s) failed. Download the [Playwright report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n`
                  : `> All tests passed.\n`);
            } catch (e) {
              summary = '### ⚠️ E2E Tests\n\nCould not read test results. Check the [Actions log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('E2E Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }